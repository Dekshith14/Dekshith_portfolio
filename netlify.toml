# Netlify configuration
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Custom serverless functions directory
[functions]
  directory = "server/netlify"

# ─── Security Headers (applied to all routes) ─────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking — disallow embedding in iframes
    X-Frame-Options = "DENY"

    # Prevent MIME-type sniffing attacks
    X-Content-Type-Options = "nosniff"

    # Control how much referrer information is sent
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Restrict browser features/APIs not used by this site
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()"

    # Force HTTPS for 1 year (only active once deployed with HTTPS)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # Content Security Policy — whitelist only what the site actually needs
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com data:;
      img-src 'self' data: blob:;
      connect-src 'self' https://api.resend.com;
      frame-ancestors 'none';
      object-src 'none';
      base-uri 'self';
      form-action 'self';
      worker-src blob:;
    """

    # Cross-Origin policies
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "require-corp"

# Cache static assets aggressively (hashed filenames, safe to cache forever)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Never cache HTML files (always serve fresh)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# ─── SPA redirect — all routes go to index.html ───────────────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ─── API redirect — /api/* maps to Netlify Functions ──────────────────────────
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
